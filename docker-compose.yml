services:
  airport:
    build:
      context: .
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
      - airplanes_media:/files/media
    command: >
      sh -c "python manage.py wait_for_db &&
            python manage.py migrate &&
            python manage.py runserver 0.0.0.0:8000"
    depends_on:
      - db


  db:
    image: postgres:18.2-alpine3.23
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - airport_db:/var/lib/postgresql/data


volumes:
  airport_db:
  airplanes_media:
